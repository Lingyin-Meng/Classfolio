<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北宋的政治</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgb(110, 88, 88);
        }

        h1,
        h2 {
            color: #8B4513;
            text-align: center;
        }

        .section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .img-box {
            text-align: center;
            margin: 20px 0;
        }

        img {
            max-width: 100%;
            height: 250px;
            border-radius: 8px;
        }

        .btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #8B4513;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .quiz {
            display: none;
            margin-top: 20px;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>北宋的政治</h1>

        <!-- 北宋建立 -->
        <div class="section">
            <h2>1. 北宋的建立</h2>
            <div class="img-box">
                <img src="赵匡胤.png" alt="宋太祖赵匡胤">
                <p>宋太祖赵匡胤</p>
            </div>
            <p>960年，后周大将赵匡胤在陈桥驿发动兵变，"黄袍加身"，建立宋朝，定都开封（东京），史称北宋。</p>
            <p>赵匡胤就是宋太祖，他和弟弟宋太宗陆续消灭了南方割据政权，结束了五代十国的分裂局面。</p>
        </div>

        <!-- 加强中央集权 -->
        <div class="section">
            <h2>2. 加强中央集权的措施</h2>
            <div class="img-box">
                <img src="杯酒释兵权.jpg" alt="杯酒释兵权">
                <p>杯酒释兵权场景</p>
            </div>
            <ul>
                <li><strong>军事上</strong>：通过"杯酒释兵权"解除大将兵权，经常调换将领</li>
                <li><strong>政治上</strong>：派文臣担任地方长官，设通判监督</li>
                <li><strong>经济上</strong>：地方财赋由中央掌控，设转运使管理</li>
            </ul>
        </div>

        <!-- 重文轻武政策 -->
        <div class="section">
            <h2>3. 重文轻武的政策</h2>
            <div class="img-box">
                <img src="北宋文官.jpeg" alt="北宋文官">
                <p>北宋文官形象</p>
            </div>
            <p>北宋重用文臣，抑制武将，发展科举制度，大幅度增加科举取士名额。</p>
            <p><strong>影响</strong>：有利于政权稳定，但导致军队战斗力减弱。</p>
        </div>


</body>

</html>
