{% extends "base.html" %}
{% block title %}注册 - 课堂作品平台{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">✨</div>
        <h1>创建新账号</h1>
        <p class="auth-subtitle">用你的真实姓名注册</p>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">姓名</label>
                <input type="text" id="username" name="username" placeholder="请输入你的真实姓名" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少4位）" required minlength="4">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="auth-switch">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
    </div>
</div>
{% endblock %}
