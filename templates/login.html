{% extends "base.html" %}
{% block title %}登录 - 课堂作品平台{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">📷</div>
        <h1>课堂作品平台</h1>
        <p class="auth-subtitle">登录你的账号</p>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">姓名</label>
                <input type="text" id="username" name="username" placeholder="请输入你的姓名" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="auth-switch">还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
    </div>
</div>
{% endblock %}
