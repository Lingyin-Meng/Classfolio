{% extends "base.html" %}
{% block title %}教师登录 - 课堂作品平台{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">👩‍🏫</div>
        <h1>教师管理后台</h1>
        <p class="auth-subtitle">请使用管理员账号登录</p>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">管理员账号</label>
                <input type="text" id="username" name="username" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="auth-switch"><a href="{{ url_for('auth.login') }}">学生登录入口</a></p>
    </div>
</div>
{% endblock %}
